<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>JASM IDE v2.0</title>
        <link rel="stylesheet" href="css/style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
    <div id="bug-modal" class="modal-background">
        <div class="modal">
            <div class="modal-header">
                <h1>Report a Bug</h1>
                <p>Help to improve Registermaschine</p>
            </div>

            <div class="modal-body">
                <div class="input-group">
                    <label for="bug-title">Title</label>
                    <input id="bug-title" type="text" placeholder="e.g. Error loading file">
                </div>
                <div class="input-group">
                    <label for="bug-description">Description</label>
                    <textarea id="bug-description" rows="5" placeholder="What happened? What were the steps?"></textarea>
                </div>
            </div>
            <div class="modal-disclaimer">
                <span>Information about your device (e.g. OS, Java-Version) are automatically appended to your description!</span>
            </div>

            <div class="modal-footer">
                <button class="btn-secondary" onclick="toggleModal('bug-modal', false)">Cancel</button>
                <button id="submit-bug-button" class="btn-primary" onclick="submitBugReport()">Submit Report</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container">
    </div>

    <header>
        <button class="btn" onclick="fileAction(FileActions.NEW)">New</button>
        <button class="btn" onclick="fileAction(FileActions.SAVE)">Save</button>
        <button class="btn" onclick="fileAction(FileActions.SAVE_AS)">Save As</button>
        <button class="btn" onclick="fileAction(FileActions.LOAD)">Load</button>
        <div class="spacer"></div>
        <button id="bug-button" class="bug" onclick="toggleModal('bug-modal', true)"></button>
    </header>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <header class="collapsible-sidebar-header" onclick="toggleSidebarSection('execution-container', 'execution-arrow')">
                <h2>Execution</h2>
                <span id="execution-arrow" class="arrow">▼</span>
            </header>
            <div id="execution-container" class="collapsible-sidebar-content collapsed">
                <div class="io-panel">
                    <div class="io-group">
                        <label for="exe-pc">PC</label>
                        <div class="io-field-wrapper">
                            <input id="exe-pc" class="styled-input" disabled value="0">
                        </div>
                    </div>
                </div>
            </div>

            <header class="collapsible-sidebar-header" onclick="toggleSidebarSection('io-container', 'io-arrow')">
                <h2>I/O</h2>
                <span id="io-arrow" class="arrow">▼</span><!--▲-->
            </header>
            <div id="io-container" class="collapsible-sidebar-content collapsed">
                <div class="io-panel">
                    <div class="io-group">
                        <label for="io-input">INPUT</label>
                        <div class="io-field-wrapper">
                            <input type="number" id="io-input" class="disabled" placeholder="Enter value...">
                            <button id="io-input-submit" onclick="submitInput()">&gt;</button>
                        </div>
                    </div>

                    <div class="io-group">
                        <label>OUTPUT</label>
                        <div id="io-output" class="io-field-display"></div>
                    </div>
                </div>
            </div>

            <!-- Title -->
            <div class="register-container">
                <header>
                    <h2>Registers</h2>
                </header>
                <div id="register-list" class="register-grid">
                </div>
            </div>

        </aside>

        <main class="workspace">
            <!-- Toolbar -->
            <nav class="toolbar">
                <span id="filename-display" class="filename">untitled.jasm</span>
                <div class="spacer"></div>
                <div class="debug-container">
                    <span>Debug</span>
                    <div class="toggle-container">
                        <input type="checkbox" id="debug-toggle" onclick="toggleDebug(this)">
                        <label for="debug-toggle" class="toggle"></label>
                    </div>
                </div>
                <div id="run-button" class="btn btn-run" onclick="runProgram()">
                    <div class="triangle-right"></div>
                    <p>Run</p>
                </div>
                <!--<button class="btn" onclick="java.stepCode()">↷ Step</button>-->
                <div id="stop-button" class="btn btn-stop disabled" onclick="stopProgram()">
                    <div class="rectangle"></div>
                    <p>Stop</p>
                </div>
            </nav>

            <!-- Code Editor -->
            <div class="editor-section">
                <div class="line-numbers" id="line-numbers">1</div>
                <div id="editor-stack" tabindex="0" class="editor-stack">
                    <div id="current-line-highlight" class="current-line-highlight"></div>
                    <div id="execution-line-highlight" class="execution-line-highlight"></div>

                    <textarea id="editor-input" spellcheck="false"></textarea>
                    <div id="editor-highlight" aria-hidden="true"></div>
                </div>
            </div>

            <!-- Instruction Documentation -->
            <section class="docs-panel" id="docs-panel">
                <div class="docs-header" onclick="toggleDocs()">
                    <span>Instruction Set</span>
                    <span id="docs-arrow" class="arrow">▲</span>
                </div>
                <div id="instruction-container" class="docs-container">
                    <div id="instruction-list" class="docs-content">
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="js/script.js"></script>
    <script src="js/bridge.js"></script>
    <script src="js/code-editor.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/filename.js"></script>
    <script src="js/alert.js"></script>
    </body>
</html>
